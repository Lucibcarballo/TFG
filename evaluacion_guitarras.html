            display: flex;

        input[type=range] {

            vertical-align: middle;
        }

        .value-display {
            font-weight: bold;
            color: #4db8ff;
            margin-left: 10px;
        }

        textarea {
            width: 100%;
            height: 100px;
            background-color: #1e1e1e;
            color: white;
            border: 1px solid #4db8ff;
            border-radius: 5px;
            padding: 10px;
            margin-top: 10px;
            box-sizing: border-box;
            resize: vertical;
        }

        button {
            background-color: #4db8ff;
            color: #1e1e1e;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
        }

        button:hover {
            background-color: #3aa1e5;

    <script>
        const players = document.querySelectorAll('.audio-player');
        players.forEach(player => {
            player.addEventListener('play', event => {
                players.forEach(p => {
                    if (p !== event.target) {
                        p.pause();
                    }
                });
            });
        });
    </script>
