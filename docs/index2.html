<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluación y Ranking de Guitarras</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e;
            color: #f0f0f0;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        h1,
        h2 {
            text-align: center;
            color: #4db8ff;
        }

        /* Cuadrícula para los audios */
        .player-container {
            background-color: #2d2d2d;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            justify-items: center;
        }

        .audio-box {
            text-align: center;
            width: 100%;
            background: #383838;
            padding: 10px;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .audio-box h3 {
            margin-top: 0;
            font-size: 16px;
        }

        audio {
            width: 100%;
            outline: none;
            height: 35px;
        }

        .survey-container {
            background-color: #2d2d2d;
            padding: 20px;
            border-radius: 10px;
        }

        /* Estilos para las secciones de características */
        .char-section {
            background-color: #383838;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            border-left: 5px solid #4db8ff;
        }

        .char-section h3 {
            margin-top: 0;
            color: #4db8ff;
            border-bottom: 1px solid #555;
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .char-section h3 span {
            font-size: 14px;
            color: #aaa;
            font-weight: normal;
        }

        /* Cuadrícula para los selectores de ranking */
        .ranking-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .ranking-row {
            display: flex;
            flex-direction: column;
            background-color: #2a2a2a;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #444;
        }

        .ranking-row label {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 8px;
            text-align: center;
            color: #ccc;
        }

        .ranking-row label.first {
            color: #ffd700;
        }

        /* Dorado para el 1ro */
        .ranking-row label.last {
            color: #ff6b6b;
        }

        /* Rojo para el último */

        select {
            background-color: #1e1e1e;
            color: white;
            border: 1px solid #4db8ff;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            width: 100%;
        }

        select option {
            background-color: #1e1e1e;
        }

        select.error {
            border-color: #ff4d4d;
            background-color: #4a1e1e;
        }

        .error-message {
            color: #ff4d4d;
            font-size: 13px;
            margin-top: 10px;
            text-align: center;
            display: none;
            font-weight: bold;
        }

        textarea,
        input[type="text"] {
            width: 100%;
            background-color: #1e1e1e;
            color: white;
            border: 1px solid #4db8ff;
            border-radius: 5px;
            padding: 10px;
            box-sizing: border-box;
        }

        textarea {
            height: 100px;
            margin-top: 10px;
            resize: vertical;
        }

        button {
            background-color: #4db8ff;
            color: #1e1e1e;
            border: none;
            padding: 15px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
            transition: 0.3s;
        }

        button:hover {
            background-color: #3aa1e5;
        }

        button:disabled {
            background-color: #666;
            cursor: not-allowed;
        }
    </style>
</head>

<body>

    <h1>Comparador y Ranking de Guitarras</h1>

    <div class="player-container">
        <div class="audio-box">
            <h3>Audio 1</h3>
            <audio controls class="audio-player">
                <source src="notas/g5_notas_ambos.wav" type="audio/wav">
            </audio>
        </div>
        <div class="audio-box">
            <h3>Audio 2</h3>
            <audio controls class="audio-player">
                <source src="notas/g4_notas_ambos.wav" type="audio/wav">
            </audio>
        </div>
        <div class="audio-box">
            <h3>Audio 3</h3>
            <audio controls class="audio-player">
                <source src="notas/g3_notas_ambos.wav" type="audio/wav">
            </audio>
        </div>
        <div class="audio-box">
            <h3>Audio 4</h3>
            <audio controls class="audio-player">
                <source src="notas/g2_notas_ambos.wav" type="audio/wav">
            </audio>
        </div>
        <div class="audio-box">
            <h3>Audio 5</h3>
            <audio controls class="audio-player">
                <source src="notas/g1_notas_ambos.wav" type="audio/wav">
            </audio>
        </div>
    </div>

    <div class="survey-container">
        <h2>Ordena de Mayor a Menor</h2>
        <p style="text-align: center; color: #aaa; margin-bottom: 30px;">Compara los audios y asigna un puesto único a
            cada uno por característica. No puedes repetir audios en la misma fila.</p>

        <form id="formulario-encuesta">

            <div id="formularios-caracteristicas"></div>

            <div
                style="margin-bottom: 25px; padding: 15px; background-color: #383838; border-radius: 8px; border-left: 5px solid #4db8ff;">
                <label for="nombre" style="display:block; margin-bottom:10px; font-weight:bold;">Nombre del
                    Evaluador:</label>
                <input type="text" id="nombre" name="Nombre del Evaluador" placeholder="Introduce tu nombre..."
                    required>
            </div>

            <label for="comentarios" style="display:block; margin-top:20px;"><b>Notas adicionales /
                    Conclusiones:</b></label>
            <textarea id="comentarios" name="Comentarios"
                placeholder="Escribe aquí tus comentarios, distintas características, conclusiones..."></textarea>

            <button type="submit" id="btn-enviar">Enviar Evaluación</button>
            <p id="estado" style="text-align: center; font-weight: bold; margin-top: 15px;"></p>

        </form>
    </div>

    <script>
        // Lógica para que solo suene un audio a la vez
        const players = document.querySelectorAll('.audio-player');
        players.forEach(player => {
            player.addEventListener('play', event => {
                players.forEach(p => {
                    if (p !== event.target) p.pause();
                });
            });
        });

        const caracteristicas = ['Brillantez', 'Proyección', 'Sustain', 'Cuerpo', 'Claridad', 'Equilibrio'];
        const puestos = ['1º (Más)', '2º Puesto', '3º Puesto', '4º Puesto', '5º (Menos)'];
        const numAudios = 5;
        const contenedorEncuesta = document.getElementById('formularios-caracteristicas');

        // URL de Google App Script
        const scriptURL = "https://script.google.com/macros/s/AKfycbzS48WjkZnkrHy8j7r8kZcR_w-b7Ik0SBnx0erZUBM2dNJHtTGyCRpijfPbyyUu41B2/exec";

        // Generador de la cuadrícula de rankings
        caracteristicas.forEach((char, indexChar) => {
            let htmlSeccion = `
                <div class="char-section" id="section-${indexChar}">
                    <h3>${char} <span>(Del mayor al menor)</span></h3>
                    <div class="ranking-grid">
            `;

            for (let i = 0; i < puestos.length; i++) {
                let labelClass = i === 0 ? 'first' : (i === 4 ? 'last' : '');

                // Name para Google Sheets: Ej. "Brillantez - 1 Puesto"
                htmlSeccion += `
                    <div class="ranking-row">
                        <label class="${labelClass}">${puestos[i]}</label>
                        <select name="${char} - ${i + 1} Puesto" class="select-rank" data-char="${indexChar}" required>
                            <option value="" disabled selected>Elige audio...</option>
                            <option value="Audio 1">Audio 1</option>
                            <option value="Audio 2">Audio 2</option>
                            <option value="Audio 3">Audio 3</option>
                            <option value="Audio 4">Audio 4</option>
                            <option value="Audio 5">Audio 5</option>
                        </select>
                    </div>
                `;
            }

            htmlSeccion += `
                    </div>
                    <div class="error-message" id="error-${indexChar}">¡Error! Has repetido un audio en esta característica.</div>
                </div>`;
            contenedorEncuesta.innerHTML += htmlSeccion;
        });

        // Lógica de validación: Evitar que seleccionen el mismo audio en la misma característica
        const btnEnviar = document.getElementById("btn-enviar");
        const allSelects = document.querySelectorAll('.select-rank');

        function checkDuplicates() {
            let hasGlobalError = false;

            // Revisamos cada grupo de características por separado
            caracteristicas.forEach((char, indexChar) => {
                const selectsInGroup = document.querySelectorAll(`select[data-char="${indexChar}"]`);
                const errorMsg = document.getElementById(`error-${indexChar}`);
                let values = [];
                let hasLocalError = false;

                // Limpiar estilos de error previos
                selectsInGroup.forEach(s => s.classList.remove('error'));

                // Recopilar valores seleccionados que no estén vacíos
                selectsInGroup.forEach(select => {
                    if (select.value !== "") {
                        if (values.includes(select.value)) {
                            hasLocalError = true;
                            hasGlobalError = true;
                            // Marcar visualmente los repetidos
                            selectsInGroup.forEach(s => {
                                if (s.value === select.value) s.classList.add('error');
                            });
                        }
                        values.push(select.value);
                    }
                });

                // Mostrar u ocultar mensaje de error
                errorMsg.style.display = hasLocalError ? 'block' : 'none';
            });

            // Deshabilitar botón de enviar si hay errores
            btnEnviar.disabled = hasGlobalError;
            return hasGlobalError;
        }

        // Añadir el evento a todos los selects
        allSelects.forEach(select => {
            select.addEventListener('change', checkDuplicates);
        });

        // Lógica para enviar el formulario a Google Sheets
        const form = document.getElementById("formulario-encuesta");
        const estado = document.getElementById("estado");

        form.addEventListener('submit', e => {
            e.preventDefault();

            // Chequeo final por si acaso
            if (checkDuplicates()) return;

            btnEnviar.disabled = true;
            estado.textContent = "Enviando datos...";
            estado.style.color = "#4db8ff";

            const formData = new FormData(form);

            fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                body: formData
            })
                .then(() => {
                    estado.innerText = "¡Listo! Datos enviados con éxito. Gracias por tu participación.";
                    estado.style.color = "#00ff88";
                    btnEnviar.innerText = "Enviar otra evaluación";
                    btnEnviar.disabled = false;
                    form.reset();
                })
                .catch(error => {
                    console.error('Error:', error);
                    estado.innerText = "Error al enviar los datos.";
                    estado.style.color = "#ff4d4d";
                    btnEnviar.disabled = false;
                    btnEnviar.innerText = "Reintentar";
                });
        });
    </script>
</body>

</html>
