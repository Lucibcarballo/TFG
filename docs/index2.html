<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluación de guitarras</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e;
            color: #f0f0f0;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #4db8ff;
        }

        /* Cuadrícula para los audios */
        .player-container {
            background-color: #2d2d2d;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            justify-items: center;
        }

        .audio-box {
            text-align: center;
            width: 100%;
        }

        audio {
            width: 100%;
            outline: none;
        }

        .survey-container {
            background-color: #2d2d2d;
            padding: 20px;
            border-radius: 10px;
        }

        /* Estilos para las secciones de características */
        .char-section {
            background-color: #383838;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 5px solid #4db8ff;
        }

        .char-section h3 {
            margin-top: 0;
            color: #4db8ff;
            border-bottom: 1px solid #555;
            padding-bottom: 10px;
        }

        /* Cuadrícula para los  10 sliders dentro de cada característica */
        .sliders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .slider-row {
            display: flex;
            align-items: center;
            background-color: #2a2a2a;
            padding: 10px;
            border-radius: 5px;
        }

        .slider-row label {
            width: 70px;
            font-weight: bold;
            font-size: 14px;
        }

        input[type=range] {
            flex-grow: 1;
            margin: 0 10px;
            cursor: pointer;
        }

        .value-display {
            font-weight: bold;
            color: #4db8ff;
            width: 20px;
            text-align: right;
        }

        textarea {
            width: 100%;
            height: 100px;
            background-color: #1e1e1e;
            color: white;
            border: 1px solid #4db8ff;
            border-radius: 5px;
            padding: 10px;
            margin-top: 10px;
            box-sizing: border-box;
            resize: vertical;
        }

        button {
            background-color: #4db8ff;
            color: #1e1e1e;
            border: none;
            padding: 15px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
            transition: 0.3s;
        }

        button:hover {
            background-color: #3aa1e5;
        }
    </style>
</head>

<body>

    <h1> Comparador de Grabaciones</h1>

    <div class="player-container"> # los audios tienen que estar en la misma carpeta
        <div class="audio-box">
            <h3>Audio 1</h3>
            <audio controls class="audio-player">
                <source src="notas/g5_notas_ambos.wav" type="audio/wav">
            </audio>
        </div>
        <div class="audio-box">
            <h3>Audio 2</h3>
            <audio controls class="audio-player">
                <source src="notas/g4_notas_uxia.wav" type="audio/wav">
            </audio>
        </div>
        <div class="audio-box">
            <h3>Audio 3</h3>
            <audio controls class="audio-player">
                <source src="notas/g3_notas_ambos.wav" type="audio/wav">
            </audio>
        </div>
        <div class="audio-box">
            <h3>Audio 4</h3>
            <audio controls class="audio-player">
                <source src="notas/g2_notas_ambos.wav" type="audio/wav">
            </audio>
        </div>
        <div class="audio-box">
            <h3>Audio 5</h3>
            <audio controls class="audio-player">
                <source src="notas/g1_notas_ambos.wav" type="audio/wav">
            </audio>
        </div>
    </div>



    <div class="survey-container">
        <h2> Evaluación Subjetiva</h2>

        <form id="formulario-encuesta">

            <div id="formularios-caracteristicas"></div>

            <div
                style="margin-bottom: 25px; padding: 15px; background-color: #383838; border-radius: 8px; border-left: 5px solid #4db8ff;">
                <label for="nombre" style="display:block; margin-bottom:10px; font-weight:bold;">Nombre del
                    Evaluador:</label>
                <input type="text" id="nombre" name="Nombre del Evaluador" placeholder="Introduce tu nombre completo"
                    required
                    style="width: 100%; padding: 10px; background-color: #1e1e1e; color: white; border: 1px solid #4db8ff; border-radius: 5px; box-sizing: border-box;">
            </div>

            <label for="comentarios" style="display:block; margin-top:20px;"><b>Notas adicionales /
                    Conclusiones:</b></label>
            <textarea id="comentarios" name="Comentarios"
                placeholder="Escribe aquí tus comentarios, distintas características, conclusiones..."></textarea>

            <button type="submit" id="btn-enviar">Enviar Evaluación</button>
            <p id="estado"></p>

            <!-- <div id="contenedor-estado"
                style="display:none; margin-top:20px; padding:15px; border-radius:8px; background: #333; text-align: center;">
                <div id="spinner"
                    style="border: 4px solid #f3f3f3; border-top: 4px solid #4db8ff; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto 10px;">
                </div>
                <p id="texto-estado" style="margin:0; font-weight:bold;"></p>
            </div> -->

            <style>
                @keyframes spin {
                    0% {
                        transform: rotate(0deg);
                    }

                    100% {
                        transform: rotate(360deg);
                    }
                }
            </style>


        </form>
    </div>

    <script>
        // Lógica para que solo suene un audio a la vez
        const players = document.querySelectorAll('.audio-player');
        players.forEach(player => {
            player.addEventListener('play', event => {
                players.forEach(p => {
                    if (p !== event.target) p.pause();
                });
            });
        });

        // Generador automático de encuestas con el atributo "name" para el correo
        const caracteristicas = ['Brillantez', 'Proyección', 'Sustain', 'Cuerpo', 'Claridad', 'Equilibrio'];
        const numAudios = 10;
        const contenedorEncuesta = document.getElementById('formularios-caracteristicas');
        const scriptURL = "https://script.google.com/macros/s/AKfycbymNlC_JGPoHq5TuOvHYFW2rtd1SRCbPgoCO5zSO5BAeyDuWeLoyd-vZKKAo0qblFYCUA/exec";
        caracteristicas.forEach(char => {
            let htmlSeccion = `
                <div class="char-section">
                    <h3>${char}</h3>
                    <div class="sliders-grid">
            `;

            for (let i = 1; i <= numAudios; i++) {
                // para que lleguen bien los resultados al email
                htmlSeccion += `
                    <div class="slider-row">
                        <label>Aud. ${i}:</label>
                        <input type="range" name="${char} - Audio ${i}" min="1" max="10" value="5" oninput="this.nextElementSibling.innerText = this.value">
                        <span class="value-display">5</span>
                    </div>
                `;
            }

            htmlSeccion += `</div></div>`;
            contenedorEncuesta.innerHTML += htmlSeccion;
        });

        // Lógica para enviar el formulario a Google Sheets
        const form = document.getElementById("formulario-encuesta");
        const estado = document.getElementById("estado");
        const btnEnviar = document.getElementById("btn-enviar");

        form.addEventListener('submit', e => {
            e.preventDefault();
            btnEnviar.disabled = true;
            estado.textContent = "Enviando datos...";

            const formData = new FormData(form);

            fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                body: formData
            })

                .then(() => {
                    estado.innerText = "¡Listo! Datos enviados.";
                    estado.style.color = "#00ff88";
                    btnEnviar.innerText = "Enviar otra evaluación";
                    btnEnviar.disabled = false;
                    form.reset();
                    document.querySelectorAll('.value-display').forEach(s => s.innerText = "5");
                })
                .catch(error => {
                    console.error('Error:', error);
                    estado.innerText = "Error al enviar.";
                    estado.style.color = "#ff4d4d";
                    btnEnviar.disabled = false;
                    btnEnviar.innerText = "Reintentar";
                });
        });
    </script>
</body>

</html>
